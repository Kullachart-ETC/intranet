<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — Intranet บริษัท</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f5f5f3;display:flex;align-items:center;justify-content:center;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap');
.card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:360px;border:1px solid #e5e5e0}
.logo{text-align:center;font-size:20px;font-weight:600;margin-bottom:0.5rem}.logo span{color:#1D9E75}
.subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:2rem}
label{font-size:13px;color:#666;display:block;margin-bottom:4px}
input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;font-family:'Sarabun',sans-serif;margin-bottom:14px}
input:focus{outline:none;border-color:#1D9E75}
.btn{width:100%;background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Sarabun',sans-serif}
.btn:hover{background:#18896a}
.error{background:#FCEBEB;color:#A32D2D;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;display:none}
.hint{text-align:center;font-size:12px;color:#aaa;margin-top:1.5rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>●</span> Intranet บริษัท</div>
  <div class="subtitle">กรุณาเข้าสู่ระบบเพื่อใช้งาน</div>
  <div class="error" id="err"></div>
  <label>ชื่อผู้ใช้</label>
  <input type="text" id="username" placeholder="username" autocomplete="username">
  <label>รหัสผ่าน</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">เข้าสู่ระบบ</button>
  <div class="hint">ติดต่อ Admin หากยังไม่มี account</div>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (!username || !password) { err.textContent='กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; err.style.display='block'; return; }
  try {
    const r = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error; err.style.display='block'; return; }
    window.location.href = '/';
  } catch(e) { err.textContent='เกิดข้อผิดพลาด กรุณาลองใหม่'; err.style.display='block'; }
}
</script>
</body>
</html>
