<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Media Center - EARTH (THAILAND)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Sarabun',sans-serif;background:#F5F5F3;color:#1a1a18}
.nav{background:#1a1a18;padding:0 24px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:50}
.nav-logo{color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-links{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.nav-links a{color:#aaa;font-size:13px;padding:6px 10px;border-radius:6px;text-decoration:none;transition:.15s}
.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.1)}
.nav-dropdown{position:relative}
.nav-dropdown>.dd-trigger{color:#aaa;font-size:13px;padding:6px 10px;border-radius:6px;text-decoration:none;transition:.15s;display:inline-block}
.nav-dropdown:hover>.dd-trigger,.nav-dropdown>.dd-trigger.active{color:#fff;background:rgba(255,255,255,.1)}
.dd-menu{display:none;position:absolute;top:100%;left:0;background:#1D9E75;min-width:210px;border-radius:8px;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.25);z-index:200;padding:6px 0}
.nav-dropdown:hover .dd-menu{display:block}
.dd-menu a{display:block;padding:9px 16px;color:#fff;font-size:13px;text-decoration:none}
.dd-menu a:hover{background:rgba(255,255,255,.15)}
.dd-menu a.dd-sub-item{padding-left:30px;font-size:12.5px;color:#e8f5ee}
.dd-header{padding:9px 16px;font-size:12px;font-weight:700;color:#0f2c6f;background:#dbeafe;margin-top:2px}

.nav-right{display:flex;align-items:center;gap:8px}
.nav-user{color:#ccc;font-size:12px}
.btn-logout{font-size:12px;color:#aaa;background:none;border:1px solid #444;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit}
.page{max-width:1100px;margin:0 auto;padding:32px 16px}
h1{font-size:22px;font-weight:700;margin-bottom:24px}
.media-tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:.15s}
.tab.active{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.media-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:.15s}
.media-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)}
.media-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;background:#f0f0ec;display:flex;align-items:center;justify-content:center;font-size:40px;color:#ccc}
.media-info{padding:10px 12px}
.media-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.media-meta{font-size:11px;color:#aaa;margin-top:3px}
.empty{text-align:center;color:#aaa;padding:64px;font-size:14px}
.upload-note{background:#E8F5F0;border-radius:10px;padding:14px 18px;font-size:13px;color:#065F46;margin-bottom:20px}
</style>
</head>
<body>
<nav class="nav">
  <a href="/index.html" class="nav-logo"><img src="/logo.png" onerror="this.style.display='none'"> EARTH (THAILAND)</a>
  <div class="nav-links">
    <a href="/index.html">หน้าแรก</a>
    <a href="/about.html">เกี่ยวกับเรา</a>
    <div class="nav-dropdown">
      <a href="/org-chart.html" class="dd-trigger">โครงสร้างองค์กร</a>
      <div class="dd-menu">
    <a href="/org-docs/board.pdf" target="_blank">คณะกรรมการบริษัท</a>
    <a href="/org-docs/management.pdf" target="_blank">ทีมผู้บริหาร</a>
    <div class="dd-header">โครงสร้างบริษัท</div>
    <a href="/org-docs/structure-head-office.pdf" target="_blank" class="dd-sub-item">Head Office</a>
    <a href="/org-docs/structure-branch.pdf" target="_blank" class="dd-sub-item">Branch</a>
    <a href="/org-docs/structure-factory1.pdf" target="_blank" class="dd-sub-item">Factory1</a>
    <a href="/org-docs/structure-factory2.pdf" target="_blank" class="dd-sub-item">Factory2</a>
      </div>
    </div>
    <a href="/news.html">ข่าวสารกิจกรรม</a>
    <a href="/webboard.html">เว็บบอร์ด</a>
    <a href="/regulations.html">ระเบียบบริษัท</a>
    <a href="/media-center.html" class="active">Media Center</a>
    <a href="/forms.html">แบบฟอร์ม - ARS</a>
  </div>
  <div class="nav-right"><span class="nav-user" id="nav-user"></span><button class="btn-logout" onclick="logout()">ออกจากระบบ</button></div>
</nav>
<div class="page">
  <h1>🎬 Media Center</h1>
  <div class="upload-note">📌 ไฟล์รูปภาพและวิดีโอจาก <a href="/documents.html" style="color:#1D9E75">คลังเอกสาร</a> หมวด "Media" จะแสดงที่นี่</div>
  <div class="media-tabs">
    <button class="tab active" onclick="filter('all',this)">ทั้งหมด</button>
    <button class="tab" onclick="filter('image',this)">รูปภาพ</button>
    <button class="tab" onclick="filter('video',this)">วิดีโอ</button>
    <button class="tab" onclick="filter('other',this)">อื่นๆ</button>
  </div>
  <div id="media-grid" class="grid"><div class="empty">กำลังโหลด...</div></div>
</div>
<script>
let allMedia=[];
function fmtDate(dt){if(!dt)return'';return new Date(dt).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});}
function fmtSize(b){if(!b)return'';if(b<1048576)return(b/1024).toFixed(0)+'KB';return(b/1048576).toFixed(1)+'MB';}
function getType(mime=''){if(mime.startsWith('image'))return'image';if(mime.startsWith('video'))return'video';return'other';}
function getIcon(mime=''){if(mime.startsWith('image'))return'🖼️';if(mime.startsWith('video'))return'🎥';if(mime.includes('pdf'))return'📄';return'📎';}
function filter(type,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const items=type==='all'?allMedia:allMedia.filter(m=>getType(m.mime_type)===type);
  render(items);
}
function render(items){
  const el=document.getElementById('media-grid');
  if(!items.length){el.innerHTML='<div class="empty" style="grid-column:1/-1">ไม่พบไฟล์มีเดีย</div>';el.style.display='block';return;}
  el.style.display='';
  el.innerHTML=items.map(m=>`<div class="media-card">
    <div class="media-thumb" style="font-size:48px">${getType(m.mime_type)==='image'?`<img src="/api/documents/${m.id}/download" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.textContent='🖼️'">`:getIcon(m.mime_type)}</div>
    <div class="media-info">
      <div class="media-name" title="${m.original_name}">${m.original_name}</div>
      <div class="media-meta">${fmtSize(m.file_size)} · ${fmtDate(m.created_at)}</div>
      <a href="/api/documents/${m.id}/download" style="font-size:12px;color:#1D9E75;text-decoration:none">⬇ ดาวน์โหลด</a>
    </div>
  </div>`).join('');
}
async function logout(){await fetch('/api/logout',{method:'POST'});window.location.href='/login.html';}
(async()=>{
  try{
    const me=await fetch('/api/me').then(r=>r.json());
    if(me.error){window.location.href='/login.html';return;}
    document.getElementById('nav-user').textContent=me.name;
    const docs=await fetch('/api/documents').then(r=>r.ok?r.json():[]).catch(()=>[]);
    allMedia=docs.filter(d=>d.dept==='Media'||d.mime_type?.startsWith('image')||d.mime_type?.startsWith('video'));
    if(!allMedia.length)allMedia=docs.filter(d=>d.mime_type?.startsWith('image')||d.mime_type?.startsWith('video'));
    render(allMedia);
  }catch(e){window.location.href='/login.html';}
})();
</script>
</body></html>
