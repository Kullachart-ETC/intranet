<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จองห้องประชุม - EARTH (THAILAND)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0F2F7;
  --white: #FFFFFF;
  --primary: #0f2c6f;
  --primary-light: #E8F0FB;
  --accent: #1D9E75;
  --danger: #D94040;
  --text: #1A1A2E;
  --muted: #6B7280;
  --border: #DDE1EA;
  --radius: 10px;
}
body { font-family: 'Sarabun','Segoe UI',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* TOP NAV */
.topnav {
  background: var(--primary);
  color: #fff;
  display: flex; align-items: center;
  padding: 0 16px; height: 50px; gap: 10px;
  flex-shrink: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.topnav a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px; }
.topnav a:hover { color: #fff; }
.topnav h1 { font-size: 15px; font-weight: 600; flex: 1; }
.topnav .nav-actions { display: flex; gap: 6px; }
.top-btn {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  color: #fff; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-family: inherit;
}
.top-btn:hover { background: rgba(255,255,255,0.25); }

/* MAIN LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 190px; flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sidebar-section { padding: 14px 12px 8px; }
.sidebar-label {
  font-size: 10px; font-weight: 700; color: var(--muted);
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 8px;
}
.room-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 9px 10px;
  border: none; background: none;
  border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 13px;
  color: var(--text); text-align: left;
  margin-bottom: 3px; transition: background 0.12s;
}
.room-btn:hover { background: var(--bg); }
.room-btn.active {
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}
.room-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.room-info { flex: 1; min-width: 0; }
.room-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.room-cap { font-size: 10px; color: var(--muted); margin-top: 1px; }

.sidebar-divider { height: 1px; background: var(--border); margin: 8px 12px; }

/* CALENDAR AREA */
.cal-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* MONTH NAV */
.month-nav {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.month-title { font-size: 17px; font-weight: 700; flex: 1; }
.nav-btn {
  width: 30px; height: 30px;
  border: 1px solid var(--border); background: var(--white);
  border-radius: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--muted); transition: all 0.12s;
}
.nav-btn:hover { border-color: var(--primary); color: var(--primary); }

/* SELECTED ROOM BADGE */
.room-badge-bar {
  padding: 8px 16px;
  background: var(--primary-light);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--primary); font-weight: 500;
  flex-shrink: 0;
}
.room-badge-dot { width: 10px; height: 10px; border-radius: 50%; }

/* CALENDAR GRID */
.cal-scroll { flex: 1; overflow-y: auto; padding: 12px 16px; }
.cal-wrap { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.weekdays { display: grid; grid-template-columns: repeat(7,1fr); background: var(--primary); }
.wday { text-align: center; padding: 8px 0; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); }
.wday.wknd { color: rgba(255,190,190,0.9); }
.days { display: grid; grid-template-columns: repeat(7,1fr); }
.dcell {
  min-height: 88px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 5px 4px; cursor: pointer; transition: background 0.1s; position: relative;
}
.dcell:nth-child(7n) { border-right: none; }
.dcell:hover { background: #F4F6FF; }
.dcell.other { background: #FAFAFA; cursor: default; }
.dcell.other .dnum { color: #CCC; }
.dcell.today { background: #EEF3FF; }
.dcell.wknd-cell { background: #FEFEFE; }
.dnum {
  font-size: 12px; font-weight: 600; color: var(--text);
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 3px; border-radius: 50%;
}
.dcell.today .dnum { background: var(--primary); color: #fff; font-weight: 700; }

/* EVENT PILLS */
.epill {
  font-size: 10px; border-radius: 4px; padding: 2px 5px;
  margin-bottom: 2px; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; display: block; line-height: 1.4;
}
.epill:hover { filter: brightness(0.88); }
.more-lbl { font-size: 10px; color: var(--muted); padding: 1px 3px; }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center; padding: 16px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 14px;
  width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.22);
  animation: up 0.18s ease;
}
@keyframes up { from { transform: translateY(16px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.mhead {
  display: flex; align-items: center;
  padding: 16px 18px 12px; border-bottom: 1px solid var(--border); gap: 8px;
}
.mhead h2 { font-size: 15px; font-weight: 700; flex: 1; }
.mclose { background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted); width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; }
.mclose:hover { background: var(--bg); }
.mbody { padding: 16px 18px; }
.mfooter { display:flex; gap:8px; justify-content:flex-end; padding:12px 18px; border-top:1px solid var(--border); }

/* FORM */
.fg { margin-bottom: 13px; }
.fg label { display:block; font-size:11px; font-weight:700; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.3px; }
.fg input, .fg select, .fg textarea {
  width:100%; border:1px solid var(--border); border-radius:8px;
  padding:8px 11px; font-size:14px; font-family:inherit; color:var(--text); background:var(--white);
}
.fg input:focus, .fg select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(15,44,111,0.08); }
.time-row { display:flex; align-items:center; gap:4px; flex-wrap:nowrap; }
.time-row select { width:68px; border:1px solid #dde1e8; border-radius:8px; padding:8px 6px; font-size:14px; font-family:inherit; background:#fff; color:var(--text); cursor:pointer; flex-shrink:0; }
.time-row select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(15,44,111,0.08); }
.time-colon { font-size:15px; font-weight:600; color:var(--text); flex-shrink:0; }
.time-sep { color:var(--muted); font-size:13px; flex-shrink:0; padding:0 6px; }

/* COLOR PICKER */
.color-row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:4px; }
.color-swatch {
  width:26px; height:26px; border-radius:50%; cursor:pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); transform: scale(1.1); }
.color-custom { border:1px solid var(--border); border-radius:50%; width:26px; height:26px; cursor:pointer; padding:0; overflow:hidden; }
.color-custom input[type=color] { width:32px; height:32px; border:none; cursor:pointer; margin:-3px; }

/* ROOM TAG IN MODAL */
.room-tag {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600;
  color:#fff; margin-bottom:2px;
}

/* EXISTING LIST */
.exist-section { margin-top:14px; }
.exist-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; margin-bottom:8px; }
.exist-item {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:8px; background:var(--bg); margin-bottom:5px;
}
.exist-color { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.exist-info { flex:1; min-width:0; }
.exist-time { font-size:12px; font-weight:600; }
.exist-name { font-size:11px; color:var(--muted); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.exist-del { background:none; border:none; color:#EF4444; cursor:pointer; font-size:14px; padding:2px 5px; border-radius:4px; opacity:0.6; }
.exist-del:hover { opacity:1; background:#FEF2F2; }

/* BTNS */
.btn { display:inline-flex; align-items:center; gap:5px; padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all 0.13s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:#0a1f52; }
.btn-primary:disabled { background:#9aadcc; cursor:not-allowed; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); }
.btn-ghost:hover { border-color:var(--primary); color:var(--primary); }

/* TOAST */
.toast { position:fixed; bottom:20px; right:20px; padding:11px 18px; border-radius:10px; font-size:13px; color:#fff; box-shadow:0 6px 20px rgba(0,0,0,0.18); z-index:999; display:none; }
.toast.show { display:block; animation:up 0.2s ease; }
.toast.ok { background:var(--accent); }
.toast.err { background:var(--danger); }

@media (max-width:640px) {
  .sidebar { width:140px; }
  .room-cap { display:none; }
  .dcell { min-height:60px; }
}

.top-btn.view-btn { padding: 4px 10px; }
.top-btn.view-btn.active { background: rgba(255,255,255,0.35); font-weight: 600; }

/* WEEK VIEW */
.week-grid { display: flex; flex-direction: column; flex: 1; overflow: auto; }
.week-header { display: grid; grid-template-columns: 60px repeat(7,1fr); border-bottom: 1px solid var(--border); background: var(--white); position: sticky; top: 0; z-index: 2; }
.week-header-cell { padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 600; border-left: 1px solid var(--border); }
.week-header-cell.today-col { color: var(--primary); }
.week-header-cell .wh-day { font-size: 18px; font-weight: 700; }
.week-body { display: grid; grid-template-columns: 60px repeat(7,1fr); flex: 1; }
.week-time-col { display: flex; flex-direction: column; }
.week-time-slot { height: 48px; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 6px; font-size: 10px; color: var(--muted); padding-top: 2px; }
.week-col { border-left: 1px solid var(--border); position: relative; }
.week-col.today-col { background: #f5f8ff; }
.week-slot { height: 48px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
.week-slot:hover { background: rgba(29,95,165,0.06); }
.week-event { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 2px 5px; font-size: 10px; color: #fff; cursor: pointer; overflow: hidden; z-index: 1; line-height: 1.3; }

/* DAY VIEW */
.day-grid { display: flex; flex-direction: column; flex: 1; overflow: auto; }
.day-header { padding: 10px 16px; background: var(--white); border-bottom: 1px solid var(--border); font-weight: 700; font-size: 16px; }
.day-body { display: grid; grid-template-columns: 60px 1fr; flex: 1; }
.day-time-col { display: flex; flex-direction: column; background: var(--white); }
.day-time-slot { height: 60px; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 8px; font-size: 11px; color: var(--muted); padding-top: 4px; }
.day-events-col { border-left: 1px solid var(--border); position: relative; }
.day-slot { height: 60px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
.day-slot:hover { background: rgba(29,95,165,0.06); }
.day-event { position: absolute; left: 4px; right: 4px; border-radius: 6px; padding: 4px 8px; font-size: 12px; color: #fff; cursor: pointer; overflow: hidden; z-index: 1; }

</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
  <a href="/">← หน้าหลัก</a>
  <h1>จองห้องประชุม</h1>
  <div class="nav-actions">
    <button class="top-btn" onclick="goToday()">Today</button>
    <div style="display:flex;gap:2px;background:rgba(255,255,255,0.1);border-radius:7px;padding:2px;">
      <button class="top-btn view-btn active" id="vbMonth" onclick="setView('month')">Month</button>
      <button class="top-btn view-btn" id="vbWeek" onclick="setView('week')">Week</button>
      <button class="top-btn view-btn" id="vbDay" onclick="setView('day')">Day</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR: Room selector -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">ห้องประชุม</div>
      <button class="room-btn active" id="rb0" onclick="selectRoom(0)">
        <div class="room-dot" style="background:#7C3AED"></div>
        <div class="room-info">
          <div class="room-name">VIP</div>
          <div class="room-cap">8 ที่นั่ง</div>
        </div>
      </button>
      <button class="room-btn" id="rb1" onclick="selectRoom(1)">
        <div class="room-dot" style="background:#1D5FA5"></div>
        <div class="room-info">
          <div class="room-name">Meeting 1</div>
          <div class="room-cap">30 ที่นั่ง</div>
        </div>
      </button>
      <button class="room-btn" id="rb2" onclick="selectRoom(2)">
        <div class="room-dot" style="background:#1D9E75"></div>
        <div class="room-info">
          <div class="room-name">Meeting 2</div>
          <div class="room-cap">6 ที่นั่ง</div>
        </div>
      </button>
      <button class="room-btn" id="rb3" onclick="selectRoom(3)">
        <div class="room-dot" style="background:#D97706"></div>
        <div class="room-info">
          <div class="room-name">Meeting 3</div>
          <div class="room-cap">12 ที่นั่ง</div>
        </div>
      </button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">คำอธิบาย</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.8;">
        เลือกห้องแล้ว<br>คลิกวันที่เพื่อจอง<br>
        <span style="color:#aaa">เลือกห้องแล้ว<br>คลิกวันที่เพื่อจอง</span>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="cal-area">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="monthTitle">—</div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="room-badge-bar" id="roomBadgeBar">
      <div class="room-badge-dot" id="badgeDot" style="background:#7C3AED"></div>
      <span id="badgeText">VIP (8 ที่นั่ง) — คลิกวันที่เพื่อจอง</span>
    </div>
    <div class="cal-scroll">
      <div class="cal-wrap">
        <div class="weekdays">
          <div class="wday wknd">Sun</div>
          <div class="wday">Mon</div><div class="wday">Tue</div>
          <div class="wday">Wed</div><div class="wday">Thu</div>
          <div class="wday">Fri</div>
          <div class="wday wknd">Sat</div>
        </div>
        <div class="days" id="daysGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="overlay" id="bookOverlay" onclick="overlayClick(event,'bookOverlay')">
  <div class="modal">
    <div class="mhead">
      <h2 id="mTitle">จองห้องประชุม</h2>
      <button class="mclose" onclick="closeModal('bookOverlay')">✕</button>
    </div>
    <div class="mbody">
      <!-- Room tag (read-only display) -->
      <div class="fg">
        <label>ห้องประชุม</label>
        <span id="mRoomTag" style="display:inline-block;padding:3px 10px;border-radius:20px;color:#fff;font-size:13px;margin-top:4px"></span>
      </div>
      <!-- Time -->
      <div class="fg">
        <label>เวลา</label>
        <div class="time-row">
          <select id="inpStartH"></select><span class="time-colon">:</span><select id="inpStartM"></select>
          <span class="time-sep">ถึง</span>
          <select id="inpEndH"></select><span class="time-colon">:</span><select id="inpEndM"></select>
        </div>
      </div>
      <!-- Name -->
      <div class="fg">
        <label>ชื่อผู้จอง</label>
        <input type="text" id="inpName" placeholder="เช่น สมชาย / ฝ่าย IT">
      </div>
      <!-- Purpose -->
      <div class="fg">
        <label>วัตถุประสงค์</label>
        <input type="text" id="inpPurpose" placeholder="เช่น ประชุมทีม">
      </div>
      <!-- Color -->
      <div class="fg">
        <label>สีการจอง</label>
        <div class="color-row" id="colorRow">
          <div class="color-swatch selected" style="background:#1D5FA5" data-color="#1D5FA5" onclick="pickColor(this,'#1D5FA5')"></div>
          <div class="color-swatch" style="background:#7C3AED" data-color="#7C3AED" onclick="pickColor(this,'#7C3AED')"></div>
          <div class="color-swatch" style="background:#1D9E75" data-color="#1D9E75" onclick="pickColor(this,'#1D9E75')"></div>
          <div class="color-swatch" style="background:#D97706" data-color="#D97706" onclick="pickColor(this,'#D97706')"></div>
          <div class="color-swatch" style="background:#DC2626" data-color="#DC2626" onclick="pickColor(this,'#DC2626')"></div>
          <div class="color-swatch" style="background:#DB2777" data-color="#DB2777" onclick="pickColor(this,'#DB2777')"></div>
          <div class="color-swatch" style="background:#0891B2" data-color="#0891B2" onclick="pickColor(this,'#0891B2')"></div>
          <div class="color-swatch" style="background:#65A30D" data-color="#65A30D" onclick="pickColor(this,'#65A30D')"></div>
          <div class="color-swatch" style="background:#64748B" data-color="#64748B" onclick="pickColor(this,'#64748B')"></div>
          <!-- Custom color -->
          <div class="color-custom" title="เลือกสีเอง">
            <input type="color" id="customColor" value="#1D5FA5" oninput="pickCustomColor(this.value)">
          </div>
        </div>
      </div>

      <!-- Existing bookings for this day & room -->
      <div class="exist-section" id="existSection"></div>
    </div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="closeModal('bookOverlay')">ยกเลิก</button>
      <button class="btn btn-primary" id="btnBook" onclick="submitBooking()">✓ จองห้อง</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT MODAL (double-click by owner) -->
<div class="overlay" id="editOverlay" onclick="overlayClick(event,'editOverlay')">
  <div class="modal">
    <div class="mhead">
      <h2 id="editTitle">แก้ไขการจอง</h2>
      <button class="mclose" onclick="closeModal('editOverlay')">✕</button>
    </div>
    <div class="mbody">
      <input type="hidden" id="editId">
      <div class="fg">
        <label>ห้องประชุม</label>
        <div class="room-tag" id="editRoomTag"></div>
      </div>
      <div class="fg">
        <label>เวลา</label>
        <div class="time-row">
          <select id="editStartH"></select><span class="time-colon">:</span><select id="editStartM"></select>
          <span class="time-sep">ถึง</span>
          <select id="editEndH"></select><span class="time-colon">:</span><select id="editEndM"></select>
        </div>
      </div>
      <div class="fg">
        <label>ชื่อผู้จอง</label>
        <input type="text" id="editName">
      </div>
      <div class="fg">
        <label>วัตถุประสงค์</label>
        <input type="text" id="editPurpose">
      </div>
      <div class="fg">
        <label>สีการจอง</label>
        <div class="color-row" id="editColorRow">
          <div class="color-swatch" style="background:#1D5FA5" data-color="#1D5FA5" onclick="pickEditColor(this,'#1D5FA5')"></div>
          <div class="color-swatch" style="background:#7C3AED" data-color="#7C3AED" onclick="pickEditColor(this,'#7C3AED')"></div>
          <div class="color-swatch" style="background:#1D9E75" data-color="#1D9E75" onclick="pickEditColor(this,'#1D9E75')"></div>
          <div class="color-swatch" style="background:#D97706" data-color="#D97706" onclick="pickEditColor(this,'#D97706')"></div>
          <div class="color-swatch" style="background:#DC2626" data-color="#DC2626" onclick="pickEditColor(this,'#DC2626')"></div>
          <div class="color-swatch" style="background:#DB2777" data-color="#DB2777" onclick="pickEditColor(this,'#DB2777')"></div>
          <div class="color-swatch" style="background:#0891B2" data-color="#0891B2" onclick="pickEditColor(this,'#0891B2')"></div>
          <div class="color-swatch" style="background:#65A30D" data-color="#65A30D" onclick="pickEditColor(this,'#65A30D')"></div>
          <div class="color-swatch" style="background:#64748B" data-color="#64748B" onclick="pickEditColor(this,'#64748B')"></div>
          <div class="color-custom" title="เลือกสีเอง">
            <input type="color" id="editCustomColor" value="#1D5FA5" oninput="pickEditCustomColor(this.value)">
          </div>
        </div>
      </div>
    </div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="closeModal('editOverlay')">ยกเลิก</button>
      <button class="btn btn-primary" id="btnSaveEdit" onclick="saveEdit()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const ROOMS = [
  { name:'VIP',      nameJP:'VIP',       seats:8,  color:'#7C3AED' },
  { name:'Meeting 1', seats:30, color:'#1D5FA5' },
  { name:'Meeting 2', seats:6,  color:'#1D9E75' },
  { name:'Meeting 3', seats:12, color:'#D97706' },
];

// ===== STATE =====
let curDate   = new Date();
let bookings  = [];
let selRoom   = 0;
let selColor  = '#1D5FA5';
let modalDate = null;
let me        = null;

// ===== INIT =====
async function init() {
  try { const r = await fetch('/api/me'); if(r.ok) me = await r.json(); } catch(e){}
  await loadBookings();
  renderView();
}

// ===== ROOM SELECT =====
function selectRoom(idx) {
  selRoom = idx;
  document.querySelectorAll('.room-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const rm = ROOMS[idx];
  document.getElementById('badgeDot').style.background = rm.color;
  document.getElementById('badgeText').textContent = `${rm.name} (${rm.seats} ที่นั่ง) — คลิกวันที่เพื่อจอง`;
  renderView();
}

// ===== LOAD =====
async function loadBookings() {
  try { const r = await fetch('/api/bookings'); if(r.ok) bookings = await r.json(); }
  catch(e) { bookings = []; }
}

// ===== CALENDAR =====
function changeMonth(d) {
  if(curView==='month') { curDate = new Date(curDate.getFullYear(), curDate.getMonth()+d, 1); }
  else if(curView==='week') { curDate.setDate(curDate.getDate()+d*7); }
  else { curDate.setDate(curDate.getDate()+d); }
  renderView();
}
function goToday() {
  curDate = new Date();
  renderView();
}

function setView(v) {
  curView = v;
  ['Month','Week','Day'].forEach(x => {
    const b = document.getElementById('vb'+x);
    if(b) b.classList.toggle('active', x.toLowerCase()===v);
  });
  renderView();
}

function renderView() {
  if (curView==='month') { renderCalendar(); }
  else if (curView==='week') { renderWeek(); }
  else { renderDay(); }
}

const HOURS = Array.from({length:15},(_,i)=>i+7); // 07:00-21:00
const ENG_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const ENG_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderWeek() {
  const y = curDate.getFullYear(), m = curDate.getMonth(), d = curDate.getDate();
  const base = new Date(y,m,d);
  const dow = base.getDay();
  const weekStart = new Date(base); weekStart.setDate(d - dow);
  const today = new Date();

  // Title
  const we = new Date(weekStart); we.setDate(we.getDate()+6);
  document.getElementById('monthTitle').textContent =
    `${ENG_MONTHS[weekStart.getMonth()]} ${weekStart.getDate()} – ${ENG_MONTHS[we.getMonth()]} ${we.getDate()}, ${weekStart.getFullYear()}`;

  const calScroll = document.querySelector('.cal-scroll');
  calScroll.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'week-grid';

  // Header
  const hdr = document.createElement('div'); hdr.className = 'week-header';
  hdr.innerHTML = '<div style="border:none"></div>';
  for(let i=0;i<7;i++) {
    const dt = new Date(weekStart); dt.setDate(dt.getDate()+i);
    const isT = same(dt,today);
    hdr.innerHTML += `<div class="week-header-cell${isT?' today-col':''}">
      <div>${ENG_DAYS[dt.getDay()]}</div>
      <div class="wh-day">${dt.getDate()}</div>
    </div>`;
  }
  grid.appendChild(hdr);

  // Body
  const body = document.createElement('div'); body.className = 'week-body';
  // Time col
  const tc = document.createElement('div'); tc.className = 'week-time-col';
  HOURS.forEach(h => { tc.innerHTML += `<div class="week-time-slot">${String(h).padStart(2,'0')}:00</div>`; });
  body.appendChild(tc);

  for(let i=0;i<7;i++) {
    const dt = new Date(weekStart); dt.setDate(dt.getDate()+i);
    const dateStr = fmt(dt);
    const isT = same(dt,today);
    const col = document.createElement('div');
    col.className = 'week-col' + (isT?' today-col':'');
    HOURS.forEach(h => {
      const sl = document.createElement('div'); sl.className = 'week-slot';
      sl.onclick = () => { curDate = new Date(dt); openModal(dateStr); };
      col.appendChild(sl);
    });
    // Overlay events
    const dayB = bookings.filter(b => b.date===dateStr && parseInt(b.room_idx)===selRoom);
    dayB.forEach(b => {
      const t = parseSlot(b.slot);
      if (!t) return;
      const topPx = (t.sh - 7) * 48 + (t.sm/60)*48;
      const hPx = Math.max(24, ((t.eh-t.sh)*60+(t.em-t.sm))/60*48);
      const ev = document.createElement('div');
      ev.className = 'week-event';
      ev.style.cssText = `top:${topPx}px;height:${hPx}px;background:${b._color||ROOMS[selRoom].color}`;
      ev.title = `${b.slot} | ${b.name}`;
      ev.textContent = `${b.slot.split('-')[0]||''} ${b.name.split(' ')[0]}`;
      ev.onclick = e => { e.stopPropagation(); curDate=new Date(dt); openModal(dateStr); };
      col.appendChild(ev);
    });
    body.appendChild(col);
  }
  grid.appendChild(body);
  calScroll.appendChild(grid);
}

function renderDay() {
  const y = curDate.getFullYear(), m = curDate.getMonth(), d = curDate.getDate();
  const dt = new Date(y,m,d);
  const dateStr = fmt(dt);
  const today = new Date();
  const isT = same(dt,today);

  document.getElementById('monthTitle').textContent =
    `${ENG_DAYS[dt.getDay()]}, ${ENG_MONTHS[m]} ${d}, ${y}`;

  const calScroll = document.querySelector('.cal-scroll');
  calScroll.innerHTML = '';

  const grid = document.createElement('div'); grid.className = 'day-grid';

  const body = document.createElement('div'); body.className = 'day-body';
  const tc = document.createElement('div'); tc.className = 'day-time-col';
  HOURS.forEach(h => { tc.innerHTML += `<div class="day-time-slot">${String(h).padStart(2,'0')}:00</div>`; });
  body.appendChild(tc);

  const ec = document.createElement('div'); ec.className = 'day-events-col';
  if(isT) ec.style.background = '#f5f8ff';
  HOURS.forEach(h => {
    const sl = document.createElement('div'); sl.className = 'day-slot';
    sl.onclick = () => openModal(dateStr);
    ec.appendChild(sl);
  });
  // Overlay events for all rooms (show all rooms in day view)
  const dayB = bookings.filter(b => b.date===dateStr && parseInt(b.room_idx)===selRoom);
  dayB.forEach(b => {
    const t = parseSlot(b.slot);
    if (!t) return;
    const topPx = (t.sh - 7) * 60 + (t.sm/60)*60;
    const hPx = Math.max(30, ((t.eh-t.sh)*60+(t.em-t.sm))/60*60);
    const ev = document.createElement('div');
    ev.className = 'day-event';
    ev.style.cssText = `top:${topPx}px;height:${hPx}px;background:${b._color||ROOMS[selRoom].color}`;
    ev.textContent = `${b.slot} — ${b.name}${b.purpose?' | '+b.purpose:''}`;
    ev.title = ev.textContent;
    ev.onclick = e => { e.stopPropagation(); openModal(dateStr); };
    ec.appendChild(ev);
  });
  body.appendChild(ec);
  grid.appendChild(body);
  calScroll.appendChild(grid);
}

function parseSlot(slot) {
  if (!slot) return null;
  const m = slot.match(/(\d+):(\d+)\s*-\s*(\d+):(\d+)/);
  if (!m) return null;
  return { sh:+m[1], sm:+m[2], eh:+m[3], em:+m[4] };
}

function renderCalendar() {
  const y = curDate.getFullYear(), m = curDate.getMonth();
  const today = new Date();
  const engM = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthTitle').textContent = `${engM[m]} ${y}`;

  // Always rebuild cal-scroll content for month view
  const calScroll = document.querySelector('.cal-scroll');
  calScroll.innerHTML = `
    <div class="cal-wrap">
      <div class="weekdays">
        <div class="wday wknd">Sun</div>
        <div class="wday">Mon</div><div class="wday">Tue</div>
        <div class="wday">Wed</div><div class="wday">Thu</div>
        <div class="wday">Fri</div>
        <div class="wday wknd">Sat</div>
      </div>
      <div class="days" id="daysGrid"></div>
    </div>`;

  const firstDow = new Date(y,m,1).getDay();
  const daysInM  = new Date(y,m+1,0).getDate();
  const daysInP  = new Date(y,m,0).getDate();
  const total    = Math.ceil((firstDow+daysInM)/7)*7;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  for (let i=0; i<total; i++) {
    let d, cm, cy, other=false;
    if (i<firstDow)                   { d=daysInP-firstDow+i+1; cm=m-1; cy=y; other=true; }
    else if (i>=firstDow+daysInM)     { d=i-firstDow-daysInM+1; cm=m+1; cy=y; other=true; }
    else                               { d=i-firstDow+1; cm=m; cy=y; }

    const cellDate = new Date(cy,cm,d);
    const dateStr  = fmt(cellDate);
    const isToday  = same(cellDate,today);
    const dow      = cellDate.getDay();
    const isWknd   = dow===0||dow===6;

    // Pills: show only selected room's bookings
    const dayB = bookings.filter(b => b.date===dateStr && parseInt(b.room_idx)===selRoom)
    .sort((a,b) => (a.slot||'').localeCompare(b.slot||''));

    const cell = document.createElement('div');
    cell.className = 'dcell'+(other?' other':'')+(isToday?' today':'')+(isWknd&&!other?' wknd-cell':'');
    if (!other) cell.onclick = () => openModal(dateStr);

    const dn = document.createElement('div');
    dn.className = 'dnum'; dn.textContent = d;
    cell.appendChild(dn);

    // Show up to 3 pills
    dayB.slice(0,3).forEach(b => {
      const pill = document.createElement('div');
      pill.className = 'epill';
      pill.style.background = b._color || ROOMS[selRoom].color;
      pill.title = `${b.slot} | ${b.name}` + (me && me.id===b.user_id ? ' (ดับเบิลคลิกเพื่อแก้ไข)' : '');
      pill.textContent = `${b.slot.split('-')[0] || ''} ${b.name.split(' ')[0]}`;
      // single click → open day modal
      pill.onclick = e => { e.stopPropagation(); openModal(dateStr); };
      // double click → open edit modal (owner only)
      pill.ondblclick = e => {
        e.stopPropagation();
        if (me && (parseInt(me.id)===parseInt(b.user_id) || (b.user_id==null && me.name && b.name && b.name.startsWith(me.name)))) openEditModal(b);
      };
      // cursor hint for owner
      if (me && (parseInt(me.id)===parseInt(b.user_id) || (b.user_id==null && me.name && b.name && b.name.startsWith(me.name)))) pill.style.cursor = 'grab';
      cell.appendChild(pill);
    });
    if (dayB.length>3) {
      const ml = document.createElement('div');
      ml.className='more-lbl'; ml.textContent=`+${dayB.length-3} อื่นๆ`;
      cell.appendChild(ml);
    }

    grid.appendChild(cell);
  }
}

function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function same(a,b) {
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}

// ===== TIME SELECT HELPERS =====
function buildHourOpts(selVal) {
  return Array.from({length:24},(_,i)=>{const h=String(i).padStart(2,'0');return`<option value="${h}"${h===selVal?' selected':''}>${h}</option>`;}).join('');
}
function buildMinOpts(selVal) {
  return ['00','10','20','30','40','50'].map(m=>`<option value="${m}"${m===selVal?' selected':''}>${m}</option>`).join('');
}
function initTimeSelects() {
  document.getElementById('inpStartH').innerHTML = buildHourOpts('09');
  document.getElementById('inpStartM').innerHTML = buildMinOpts('00');
  document.getElementById('inpEndH').innerHTML   = buildHourOpts('10');
  document.getElementById('inpEndM').innerHTML   = buildMinOpts('00');
  document.getElementById('editStartH').innerHTML = buildHourOpts('09');
  document.getElementById('editStartM').innerHTML = buildMinOpts('00');
  document.getElementById('editEndH').innerHTML   = buildHourOpts('10');
  document.getElementById('editEndM').innerHTML   = buildMinOpts('00');
}
function getTimeStr(hId, mId) {
  return document.getElementById(hId).value + ':' + document.getElementById(mId).value;
}
function setTimeStr(hId, mId, val) {
  const [h, m] = (val || '09:00').split(':');
  document.getElementById(hId).value = h || '09';
  document.getElementById(mId).value = (['00','10','20','30','40','50'].includes(m) ? m : '00');
}

// ===== MODAL =====
function openModal(dateStr) {
  modalDate = dateStr;
  const rm = ROOMS[selRoom];
  const [y,mo,d] = dateStr.split('-').map(Number);
  const thaiM = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('mTitle').textContent = `${d} ${thaiM[mo]} ${y+543}`;

  // Room tag
  const tag = document.getElementById('mRoomTag');
  tag.textContent = `${rm.name}  (${rm.seats} ที่นั่ง)`;
  tag.style.background = rm.color;

  // Pre-fill user name
  if (me && !document.getElementById('inpName').value)
    document.getElementById('inpName').value = `${me.name} (${me.dept})`;

  renderExisting();
  // event delegation for cancel buttons (avoid inline onclick issues)
  const sec = document.getElementById('existSection');
  sec.onclick = e => {
    const btn = e.target.closest('[data-del-id]');
    if (btn) delBooking(parseInt(btn.dataset.delId));
  };
  document.getElementById('bookOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function overlayClick(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

// ===== COLOR =====
function pickColor(el, color) {
  selColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('customColor').value = color;
}
function pickCustomColor(color) {
  selColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
}

// ===== EXISTING =====
function renderExisting() {
  const dayB = bookings.filter(b => b.date===modalDate && parseInt(b.room_idx)===selRoom)
    .sort((a,b) => (a.slot||'').localeCompare(b.slot||''));
  const sec = document.getElementById('existSection');
  if (!dayB.length) { sec.innerHTML=''; return; }
  sec.innerHTML = `<div class="exist-label">การจองวันนี้ (${dayB.length} รายการ)</div>` +
    dayB.map(b => {
      const isOwner = me && (parseInt(me.id)===parseInt(b.user_id) || (b.user_id==null && me.name && b.name && b.name.startsWith(me.name)));
      const canDel  = me && (parseInt(me.id)===parseInt(b.user_id) || me.role==='admin' || (b.user_id==null && me.name && b.name && b.name.startsWith(me.name)));
      const color   = b._color || ROOMS[selRoom].color;
      const editHint = isOwner ? ' title="ดับเบิลคลิกเพื่อแก้ไข" style="cursor:pointer"' : '';
      return `<div class="exist-item" id="ei${b.id}" ondblclick="${isOwner?`openEditModal(bookings.find(x=>x.id==${b.id}))`:''}">
        <div class="exist-color" style="background:${color}"></div>
        <div class="exist-info"${editHint}>
          <div class="exist-time">${b.slot} ${isOwner?'<span style="font-size:10px;color:var(--muted)">(ดับเบิลคลิกแก้ไข)</span>':''}</div>
          <div class="exist-name">${b.name}${(()=>{const p=b._purpose!==undefined?b._purpose:(b.purpose||'').replace(/^COLOR:[^|]*\|/,'');return p?' — '+p:'';})()}</div>
        </div>
        ${canDel?`<button class="exist-del" data-del-id="${b.id}" title="ยกเลิกการจอง">✕</button>`:''}
      </div>`;
    }).join('');
}

// ===== EDIT MODAL =====
let editColor = '#1D5FA5';

function openEditModal(b) {
  if (!b) return;
  const rm = ROOMS[parseInt(b.room_idx)];
  const [y,mo,d] = b.date.split('-').map(Number);
  const thaiM = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('editTitle').textContent = `แก้ไข — ${d} ${thaiM[mo]} ${y+543}`;

  const tag = document.getElementById('editRoomTag');
  tag.textContent = `${rm.name} (${rm.seats} ที่นั่ง)`;
  tag.style.background = rm.color;

  document.getElementById('editId').value  = b.id;
  const [start,end] = (b.slot||'09:00-10:00').split('-');
  setTimeStr('editStartH','editStartM', start||'09:00');
  setTimeStr('editEndH','editEndM', end||'10:00');
  document.getElementById('editName').value    = b.name||'';
  document.getElementById('editPurpose').value = b._purpose||'';

  editColor = b._color || rm.color;
  document.getElementById('editCustomColor').value = editColor;
  document.querySelectorAll('#editColorRow .color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === editColor);
  });

  // close booking modal first
  closeModal('bookOverlay');
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function pickEditColor(el, color) {
  editColor = color;
  document.querySelectorAll('#editColorRow .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('editCustomColor').value = color;
}
function pickEditCustomColor(color) {
  editColor = color;
  document.querySelectorAll('#editColorRow .color-swatch').forEach(s => s.classList.remove('selected'));
}

async function saveEdit() {
  const id    = document.getElementById('editId').value;
  const start = getTimeStr('editStartH','editStartM');
  const end   = getTimeStr('editEndH','editEndM');
  const name  = document.getElementById('editName').value.trim();
  const purp  = document.getElementById('editPurpose').value.trim();

  if (!start||!end) { toast('กรอกเวลาด้วยครับ','err'); return; }
  if (start>=end)   { toast('เวลาสิ้นสุดต้องมากกว่าเริ่มต้น','err'); return; }
  if (!name)        { toast('กรอกชื่อผู้จองด้วยครับ','err'); return; }

  const slot    = `${start}-${end}`;
  const purpose = `COLOR:${editColor}|${purp}`;

  const btn = document.getElementById('btnSaveEdit');
  btn.disabled=true; btn.textContent='กำลังบันทึก...';

  // ลบอันเก่า แล้วสร้างใหม่ (เพราะ API เดิมไม่มี PUT /bookings/:id)
  const orig = bookings.find(b=>b.id==id);
  try {
    await fetch(`/api/bookings/${id}`,{method:'DELETE'});
    const r = await fetch('/api/bookings',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ room_idx: orig.room_idx, date: orig.date, slot, name, purpose })
    });
    if (r.ok) {
      toast('แก้ไขสำเร็จแล้วครับ','ok');
      closeModal('editOverlay');
      await loadBookings();
      parseColors();
      renderView();
    } else {
      const e = await r.json();
      toast(e.error||'บันทึกไม่สำเร็จ','err');
      // คืนข้อมูลเดิม
      await loadBookings(); parseColors(); renderView();
    }
  } catch(e) { toast('เกิดข้อผิดพลาด','err'); }

  btn.disabled=false; btn.textContent='💾 บันทึก';
}

// ===== SUBMIT =====
async function submitBooking() {
  const start = getTimeStr('inpStartH','inpStartM');
  const end   = getTimeStr('inpEndH','inpEndM');
  const name  = document.getElementById('inpName').value.trim();
  const purp  = document.getElementById('inpPurpose').value.trim();

  if (!start||!end) { toast('กรอกเวลาด้วยครับ','err'); return; }
  if (start>=end)   { toast('เวลาสิ้นสุดต้องมากกว่าเริ่มต้น','err'); return; }
  if (!name)        { toast('กรอกชื่อผู้จองด้วยครับ','err'); return; }

  const slot = `${start}-${end}`;
  // Client-side overlap check
  const conflict = bookings.find(b => b.date===modalDate && parseInt(b.room_idx)===selRoom
    && b.slot.split('-')[0]<end && b.slot.split('-')[1]>start);
  if (conflict) { toast(`ช่วงเวลาทับซ้อนกับ ${conflict.slot} (${conflict.name})`, 'err'); return; }
  // Encode color into purpose field: "COLOR:#hex|purpose"
  const purposeWithColor = `COLOR:${selColor}|${purp}`;

  const btn = document.getElementById('btnBook');
  btn.disabled=true; btn.textContent='กำลังจอง...';

  try {
    const r = await fetch('/api/bookings',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ room_idx:selRoom, date:modalDate, slot, name, purpose:purposeWithColor })
    });
    if (r.ok) {
      toast('จองสำเร็จแล้วครับ','ok');
      document.getElementById('inpPurpose').value='';
      setTimeStr('inpStartH','inpStartM','09:00');
      setTimeStr('inpEndH','inpEndM','10:00');
      await loadBookings();
      parseColors();
      renderView();
      renderExisting();
    } else {
      const e = await r.json();
      toast(e.error||'จองไม่สำเร็จ','err');
    }
  } catch(e){ toast('เกิดข้อผิดพลาด','err'); }

  btn.disabled=false; btn.textContent='✓ จองห้อง';
}

// ===== TOAST =====
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='ok' ? '#1D9E75' : '#DC2626';
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display='none'; }, 3000);
}

// ===== DELETE =====
async function delBooking(id) {
  // ลบ element จาก DOM ทันที (optimistic)
  const el = document.getElementById('ei'+id);
  if (el) el.style.opacity = '0.3';
  try {
    const r = await fetch(`/api/bookings/${id}`,{method:'DELETE'});
    if (r.ok) {
      closeModal('bookOverlay');
      await loadBookings();
      parseColors();
      renderView();
      renderExisting();
      toast('ยกเลิกการจองแล้ว ✓','ok');
    } else {
      if (el) el.style.opacity = '';
      const e = await r.json().catch(()=>({}));
      toast(e.error||'ยกเลิกไม่สำเร็จ ('+r.status+')','err');
    }
  } catch(e) {
    if (el) el.style.opacity = '';
    toast('เกิดข้อผิดพลาด: '+e.message,'err');
  }
}

// ===== PARSE COLOR from purpose field =====
function parseColors() {
  bookings.forEach(b => {
    if (b.purpose && b.purpose.startsWith('COLOR:')) {
      const rest  = b.purpose.substring(6); // "#RRGGBB|purpose text"
      const pipe  = rest.indexOf('|');
      b._color    = pipe>=0 ? rest.substring(0,pipe) : rest;
      b._purpose  = pipe>=0 ? rest.substring(pipe+1) : '';
    } else {
      b._color    = ROOMS[parseInt(b.room_idx)]?.color;
      b._purpose  = b.purpose||'';
    }
  });
}

// ===== TOAST =====
function toast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type==='ok'?'ok':type==='err'?'err':''}`;
  setTimeout(()=>t.className='toast',3000);
}

// ===== RUN =====
(async()=>{
  try { initTimeSelects(); } catch(e) { console.error('initTimeSelects error:', e); }
  try {
    await init();
    parseColors();
  } catch(e) { console.error('init error:', e); bookings = bookings || []; }
  try { renderView(); } catch(e) { console.error('renderView error:', e); }
})();

// Fallback: if calendar still empty after 800ms, render again
setTimeout(() => {
  const grid = document.querySelector('.days');
  if (!grid || grid.children.length === 0) {
    try { renderView(); } catch(e) {}
  }
}, 800);
</script>
