<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จองห้องประชุม - EARTH (THAILAND)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F6FA;
    --white: #FFFFFF;
    --primary: #1D5FA5;
    --primary-light: #E8F0FB;
    --accent: #1D9E75;
    --danger: #D94040;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --border: #E2E5EC;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --radius: 10px;
  }

  body {
    font-family: 'Sarabun', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }

  /* NAV */
  .topnav {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 52px;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .topnav a.back {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .topnav a.back:hover { color: #fff; }
  .topnav h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .topnav .today-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .topnav .today-btn:hover { background: rgba(255,255,255,0.25); }

  /* LAYOUT */
  .container { max-width: 1280px; margin: 0 auto; padding: 20px 16px; }

  /* MONTH NAV */
  .month-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .month-title { font-size: 20px; font-weight: 700; color: var(--text); flex: 1; }
  .nav-btn {
    background: var(--white);
    border: 1px solid var(--border);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--primary); color: var(--primary); }

  /* ROOM LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .legend-item.active { border-color: var(--primary); background: var(--primary-light); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* CALENDAR GRID */
  .calendar-wrap {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--primary);
  }
  .weekday {
    text-align: center;
    padding: 10px 0;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
  }
  .weekday.weekend { color: rgba(255,200,200,0.85); }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-top: none;
  }
  .day-cell {
    min-height: 90px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #F0F4FF; }
  .day-cell.other-month { background: #FAFAFA; }
  .day-cell.other-month .day-num { color: #CCC; }
  .day-cell.today { background: var(--primary-light); }
  .day-cell.today .day-num {
    background: var(--primary);
    color: #fff;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .day-cell.weekend-cell { background: #FEFEFE; }
  .day-cell.weekend-cell:hover { background: #F5F5FF; }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .booking-pill {
    font-size: 10.5px;
    border-radius: 4px;
    padding: 2px 6px;
    margin-bottom: 2px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .booking-pill:hover { opacity: 0.85; }
  .more-badge {
    font-size: 10px;
    color: var(--text-muted);
    padding: 1px 4px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 14px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    display: flex;
    align-items: center;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .modal-header h2 { font-size: 16px; font-weight: 700; flex: 1; }
  .modal-close {
    background: none; border: none;
    font-size: 20px; cursor: pointer;
    color: var(--text-muted); width: 30px; height: 30px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--bg); }
  .modal-body { padding: 18px 20px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(29,95,165,0.1);
  }

  /* TIME SLOTS */
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 4px;
  }
  .slot-btn {
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 4px;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    background: var(--white);
    transition: all 0.12s;
    color: var(--text);
  }
  .slot-btn:hover:not(.booked) { border-color: var(--primary); background: var(--primary-light); }
  .slot-btn.selected { border-color: var(--primary); background: var(--primary); color: #fff; font-weight: 600; }
  .slot-btn.booked {
    background: #FEF2F2;
    border-color: #FCA5A5;
    color: #EF4444;
    cursor: not-allowed;
    font-size: 11px;
  }

  /* EXISTING BOOKINGS IN MODAL */
  .existing-list { margin-top: 16px; }
  .existing-list h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
  .existing-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg);
    margin-bottom: 6px;
    font-size: 13px;
  }
  .existing-item .room-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    color: #fff;
    white-space: nowrap;
  }
  .existing-item .info { flex: 1; min-width: 0; }
  .existing-item .slot-time { font-weight: 600; font-size: 12px; }
  .existing-item .booker { color: var(--text-muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .delete-btn {
    background: none;
    border: none;
    color: #EF4444;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0.6;
  }
  .delete-btn:hover { opacity: 1; background: #FEF2F2; }

  /* BTNS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #174d8a; }
  .btn-primary:disabled { background: #9DB5D3; cursor: not-allowed; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
  .modal-footer {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--text);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 999;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .toast.show { display: block; }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }

  @media (max-width: 640px) {
    .slots-grid { grid-template-columns: repeat(2, 1fr); }
    .day-cell { min-height: 60px; padding: 4px; }
    .booking-pill { font-size: 9px; }
  }
</style>
</head>
<body>

<div class="topnav">
  <a href="/" class="back">← หน้าหลัก</a>
  <h1>📅 จองห้องประชุม</h1>
  <button class="today-btn" onclick="goToday()">วันนี้</button>
</div>

<div class="container">
  <!-- Month Navigation -->
  <div class="month-header">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-title" id="monthTitle">—</div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Room Legend / Filter -->
  <div class="legend" id="roomLegend"></div>

  <!-- Calendar -->
  <div class="calendar-wrap">
    <div class="weekdays">
      <div class="weekday weekend">อา</div>
      <div class="weekday">จ</div>
      <div class="weekday">อ</div>
      <div class="weekday">พ</div>
      <div class="weekday">พฤ</div>
      <div class="weekday">ศ</div>
      <div class="weekday weekend">ส</div>
    </div>
    <div class="days-grid" id="daysGrid">
      <div class="loading">กำลังโหลด...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">จองห้องประชุม</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Form -->
      <div id="bookingForm">
        <div class="form-group">
          <label>ห้องประชุม</label>
          <select id="selRoom" onchange="renderSlots()">
            <option value="0">VIP (8 ที่นั่ง)</option>
            <option value="1">Meeting 1 (30 ที่นั่ง)</option>
            <option value="2">Meeting 2 (6 ที่นั่ง)</option>
            <option value="3">Meeting 3 (12 ที่นั่ง)</option>
          </select>
        </div>
        <div class="form-group">
          <label>เลือกช่วงเวลา</label>
          <div class="slots-grid" id="slotsGrid"></div>
        </div>
        <div class="form-group">
          <label>ชื่อผู้จอง / หน่วยงาน</label>
          <input type="text" id="inpName" placeholder="เช่น สมชาย / ฝ่าย IT">
        </div>
        <div class="form-group">
          <label>วัตถุประสงค์</label>
          <input type="text" id="inpPurpose" placeholder="เช่น ประชุมทีม, สัมภาษณ์งาน">
        </div>
      </div>

      <!-- Existing bookings for this day -->
      <div class="existing-list" id="existingList"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="btnBook" onclick="submitBooking()">✓ จองห้อง</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const ROOMS = [
  { name: 'VIP', seats: 8,    color: '#7C3AED' },
  { name: 'Meeting 1', seats: 30, color: '#1D5FA5' },
  { name: 'Meeting 2', seats: 6,  color: '#1D9E75' },
  { name: 'Meeting 3', seats: 12, color: '#D97706' },
];

const SLOTS = [
  '08:00-09:00','09:00-10:00','10:00-11:00','11:00-12:00',
  '12:00-13:00','13:00-14:00','14:00-15:00','15:00-16:00',
  '16:00-17:00','17:00-18:00',
];

// ===== STATE =====
let currentDate = new Date();
let bookings = [];
let activeRooms = new Set([0,1,2,3]);
let selectedSlots = new Set();
let modalDate = null;
let currentUser = null;

// ===== INIT =====
async function init() {
  try {
    const res = await fetch('/api/me');
    if (res.ok) currentUser = await res.json();
  } catch(e) {}

  renderLegend();
  await loadBookings();
  renderCalendar();
}

// ===== LEGEND =====
function renderLegend() {
  const el = document.getElementById('roomLegend');
  el.innerHTML = ROOMS.map((r, i) => `
    <div class="legend-item active" id="leg${i}" onclick="toggleRoom(${i})">
      <div class="legend-dot" style="background:${r.color}"></div>
      ${r.name} (${r.seats} ที่นั่ง)
    </div>
  `).join('');
}

function toggleRoom(i) {
  if (activeRooms.has(i)) {
    if (activeRooms.size === 1) return; // ต้องเลือกอย่างน้อย 1
    activeRooms.delete(i);
    document.getElementById('leg'+i).classList.remove('active');
  } else {
    activeRooms.add(i);
    document.getElementById('leg'+i).classList.add('active');
  }
  renderCalendar();
}

// ===== LOAD DATA =====
async function loadBookings() {
  try {
    const res = await fetch('/api/bookings');
    if (res.ok) bookings = await res.json();
  } catch(e) { bookings = []; }
}

// ===== CALENDAR =====
function changeMonth(delta) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + delta, 1);
  renderCalendar();
}

function goToday() {
  currentDate = new Date();
  renderCalendar();
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const today = new Date();

  // Month title (Thai)
  const thaiMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
    'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  document.getElementById('monthTitle').textContent =
    `${thaiMonths[month]} ${year + 543}`;

  // Compute days
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let d, m, y, isOther = false;

    if (i < firstDay) {
      d = daysInPrev - firstDay + i + 1;
      m = month - 1; y = year;
      isOther = true;
    } else if (i >= firstDay + daysInMonth) {
      d = i - firstDay - daysInMonth + 1;
      m = month + 1; y = year;
      isOther = true;
    } else {
      d = i - firstDay + 1;
      m = month; y = year;
    }

    const cellDate = new Date(y, m, d);
    const dateStr = formatDate(cellDate);
    const isToday = sameDay(cellDate, today);
    const dow = cellDate.getDay(); // 0=Sun 6=Sat

    // Get bookings for this date (filtered by active rooms)
    const dayBookings = bookings.filter(b =>
      b.date === dateStr && activeRooms.has(parseInt(b.room_idx))
    );

    const cell = document.createElement('div');
    cell.className = 'day-cell' +
      (isOther ? ' other-month' : '') +
      (isToday ? ' today' : '') +
      (dow === 0 || dow === 6 ? ' weekend-cell' : '');

    if (!isOther) {
      cell.onclick = () => openModal(dateStr, cellDate);
    }

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    // Booking pills (max 3 shown)
    const show = dayBookings.slice(0, 3);
    show.forEach(b => {
      const pill = document.createElement('div');
      pill.className = 'booking-pill';
      pill.style.background = ROOMS[parseInt(b.room_idx)]?.color || '#888';
      pill.title = `${ROOMS[parseInt(b.room_idx)]?.name} | ${b.slot} | ${b.name}`;
      pill.textContent = `${ROOMS[parseInt(b.room_idx)]?.name} ${b.slot.split('-')[0]}`;
      pill.onclick = (e) => { e.stopPropagation(); openModal(dateStr, cellDate, parseInt(b.room_idx)); };
      cell.appendChild(pill);
    });
    if (dayBookings.length > 3) {
      const more = document.createElement('div');
      more.className = 'more-badge';
      more.textContent = `+${dayBookings.length - 3} รายการ`;
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

// ===== MODAL =====
function openModal(dateStr, dateObj, preselectRoom = null) {
  modalDate = dateStr;
  selectedSlots.clear();

  const thaiMonths = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
    'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const d = dateObj || new Date(dateStr);
  document.getElementById('modalTitle').textContent =
    `จอง — ${d.getDate()} ${thaiMonths[d.getMonth()]} ${d.getFullYear()+543}`;

  if (preselectRoom !== null) {
    document.getElementById('selRoom').value = preselectRoom;
  }

  // Pre-fill name from user
  if (currentUser && !document.getElementById('inpName').value) {
    document.getElementById('inpName').value = `${currentUser.name} (${currentUser.dept})`;
  }

  renderSlots();
  renderExisting();

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  selectedSlots.clear();
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function renderSlots() {
  const roomIdx = parseInt(document.getElementById('selRoom').value);
  const bookedSlots = bookings
    .filter(b => b.date === modalDate && parseInt(b.room_idx) === roomIdx)
    .map(b => b.slot);

  selectedSlots.clear();

  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = SLOTS.map(slot => {
    const isBooked = bookedSlots.includes(slot);
    const booker = isBooked
      ? bookings.find(b => b.date===modalDate && parseInt(b.room_idx)===roomIdx && b.slot===slot)?.name || ''
      : '';
    return `
      <div class="slot-btn ${isBooked ? 'booked' : ''}"
           id="slot_${slot.replace(':','-').replace(':','-')}"
           onclick="${isBooked ? '' : `toggleSlot('${slot}')`}"
           title="${isBooked ? 'จองแล้ว: '+booker : slot}">
        ${slot}
        ${isBooked ? `<br><span style="font-size:10px;opacity:0.7">${booker.split(' ')[0]}</span>` : ''}
      </div>`;
  }).join('');
}

function toggleSlot(slot) {
  if (selectedSlots.has(slot)) {
    selectedSlots.delete(slot);
  } else {
    selectedSlots.add(slot);
  }
  // Re-render slot buttons
  SLOTS.forEach(s => {
    const id = 'slot_' + s.replace(':','-').replace(':','-');
    const el = document.getElementById(id);
    if (el && !el.classList.contains('booked')) {
      el.classList.toggle('selected', selectedSlots.has(s));
    }
  });
}

function renderExisting() {
  const dayBookings = bookings.filter(b => b.date === modalDate);
  const el = document.getElementById('existingList');
  if (dayBookings.length === 0) { el.innerHTML = ''; return; }

  el.innerHTML = `<h3>การจองวันนี้ทั้งหมด (${dayBookings.length} รายการ)</h3>` +
    dayBookings.map(b => {
      const room = ROOMS[parseInt(b.room_idx)];
      const canDelete = currentUser && (currentUser.id === b.user_id || currentUser.role === 'admin');
      return `
      <div class="existing-item" id="existingItem_${b.id}">
        <div class="room-badge" style="background:${room?.color||'#888'}">${room?.name||'?'}</div>
        <div class="info">
          <div class="slot-time">${b.slot}</div>
          <div class="booker">${b.name} — ${b.purpose||'-'}</div>
        </div>
        ${canDelete ? `<button class="delete-btn" onclick="deleteBooking(${b.id})" title="ยกเลิกการจอง">✕</button>` : ''}
      </div>`;
    }).join('');
}

// ===== SUBMIT =====
async function submitBooking() {
  if (selectedSlots.size === 0) { showToast('เลือกช่วงเวลาก่อนครับ', 'error'); return; }
  const name = document.getElementById('inpName').value.trim();
  const purpose = document.getElementById('inpPurpose').value.trim();
  if (!name) { showToast('กรอกชื่อผู้จองด้วยครับ', 'error'); return; }

  const roomIdx = parseInt(document.getElementById('selRoom').value);
  const btn = document.getElementById('btnBook');
  btn.disabled = true;
  btn.textContent = 'กำลังจอง...';

  let success = 0, fail = 0;
  for (const slot of selectedSlots) {
    try {
      const res = await fetch('/api/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room_idx: roomIdx, date: modalDate, slot, name, purpose })
      });
      if (res.ok) success++;
      else { const e = await res.json(); fail++; }
    } catch(e) { fail++; }
  }

  btn.disabled = false;
  btn.textContent = '✓ จองห้อง';

  await loadBookings();
  renderCalendar();
  renderSlots();
  renderExisting();

  if (success > 0) showToast(`จองสำเร็จ ${success} ช่วงเวลา${fail>0?' (ซ้ำ '+fail+' รายการ)':''}`, 'success');
  else showToast('ไม่สามารถจองได้ ช่วงเวลาถูกจองแล้ว', 'error');

  if (success > 0) {
    document.getElementById('inpPurpose').value = '';
    selectedSlots.clear();
  }
}

// ===== DELETE =====
async function deleteBooking(id) {
  if (!confirm('ยืนยันการยกเลิกการจองนี้?')) return;
  try {
    const res = await fetch(`/api/bookings/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('ยกเลิกการจองแล้ว', 'success');
      await loadBookings();
      renderCalendar();
      renderExisting();
      renderSlots();
    } else showToast('ไม่สามารถลบได้', 'error');
  } catch(e) { showToast('เกิดข้อผิดพลาด', 'error'); }
}

// ===== TOAST =====
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

init();
</script>
